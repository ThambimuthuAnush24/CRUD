<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BestStore - Product Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">
    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg overflow-hidden">
      <!-- Header -->
      <div class="bg-blue-600 px-6 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Product Details</h1>
        <a
          href="/products"
          class="text-white hover:text-blue-200 flex items-center gap-1 text-sm"
        >
          <i class="fas fa-arrow-left"></i> Back to Products
        </a>
      </div>

      <div class="p-6 flex flex-col md:flex-row gap-8">
        <!-- Product Image -->
        <div class="flex-shrink-0 flex justify-center md:justify-start">
          <img
            th:if="${product.imageFileName}"
            th:src="@{'/images/' + ${product.imageFileName}}"
            alt="Product Image"
            class="w-56 h-56 object-contain rounded-xl border border-gray-200 bg-gray-50 p-2"
          />
          <div
            th:unless="${product.imageFileName}"
            class="w-56 h-56 bg-gray-200 rounded-xl flex items-center justify-center"
          >
            <i class="fas fa-image text-gray-400 text-5xl"></i>
          </div>
        </div>

        <!-- Product Info -->
        <div class="flex-1 space-y-4">
          <div>
            <h2 class="text-3xl font-bold text-gray-800" th:text="${product.name}"></h2>
            <p class="text-gray-500 text-sm mt-1">ID: <span th:text="${product.id}"></span></p>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-50 rounded-lg p-3">
              <p class="text-xs text-gray-400 uppercase font-semibold">Brand</p>
              <p class="text-gray-700 font-medium mt-1" th:text="${product.brand}"></p>
            </div>
            <div class="bg-gray-50 rounded-lg p-3">
              <p class="text-xs text-gray-400 uppercase font-semibold">Category</p>
              <p class="text-gray-700 font-medium mt-1" th:text="${product.category}"></p>
            </div>
            <div class="bg-gray-50 rounded-lg p-3">
              <p class="text-xs text-gray-400 uppercase font-semibold">Price</p>
              <p
                class="text-blue-600 text-xl font-bold mt-1"
                th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"
              ></p>
            </div>
            <div class="bg-gray-50 rounded-lg p-3">
              <p class="text-xs text-gray-400 uppercase font-semibold">Created At</p>
              <p
                class="text-gray-700 font-medium mt-1"
                th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}"
              ></p>
            </div>
          </div>

          <!-- Description -->
          <div class="bg-gray-50 rounded-lg p-4">
            <p class="text-xs text-gray-400 uppercase font-semibold mb-2">Description</p>
            <p class="text-gray-700 leading-relaxed" th:text="${product.description}"></p>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="px-6 pb-6 flex gap-3">
        <a
          th:href="@{/products/edit(id=${product.id})}"
          class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-6 py-2 rounded-lg shadow flex items-center gap-2"
        >
          <i class="fas fa-pen"></i> Edit
        </a>
        <a
          th:href="@{/products/delete(id=${product.id})}"
          onclick="return confirm('Are you sure you want to delete this product?')"
          class="bg-red-500 hover:bg-red-600 text-white font-medium px-6 py-2 rounded-lg shadow flex items-center gap-2"
        >
          <i class="fas fa-trash"></i> Delete
        </a>
      </div>
    </div>
  </body>
</html>
